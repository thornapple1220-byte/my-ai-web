name: Supabase Keep Alive

on:
  schedule:
    # 주 3회 실행 (월, 수, 금 오전 9시 UTC = 오후 6시 KST)
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (gyms 테이블)
        run: |
          curl -sf "${{ secrets.VITE_FINDGYM_SUPABASE_URL }}/rest/v1/gyms?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_FINDGYM_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_FINDGYM_SUPABASE_ANON_KEY }}"
          echo "Supabase ping successful!"
