name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build travelstagram
        working-directory: lecture1/travelstagram
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm ci && npm run build

      - name: Install & Build my-community (cafe)
        working-directory: lecture1/my-community
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm ci && npm run build

      - name: Install & Build findgym
        working-directory: lecture1/findgym
        env:
          VITE_FINDGYM_SUPABASE_URL: ${{ secrets.VITE_FINDGYM_SUPABASE_URL }}
          VITE_FINDGYM_SUPABASE_ANON_KEY: ${{ secrets.VITE_FINDGYM_SUPABASE_ANON_KEY }}
        run: npm ci && npm run build

      - name: Merge build outputs
        run: |
          mkdir -p dist
          cp -r lecture1/travelstagram/dist/. dist/
          mkdir -p dist/cafe
          cp -r lecture1/my-community/dist/. dist/cafe/
          mkdir -p dist/findgym
          cp -r lecture1/findgym/dist/. dist/findgym/
          cp birthday.html dist/birthday.html
          cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
