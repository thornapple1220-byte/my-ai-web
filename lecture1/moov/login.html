<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOOV — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0D0E12;
      --card-bg: #161820;
      --cyan:    #00F0FF;
      --pink:    #FF007A;
      --white:   #FFFFFF;
      --gray:    #8A8D99;
      --border:  rgba(255,255,255,0.08);
      --glow-cyan: 0 0 20px rgba(0,240,255,0.45), 0 0 40px rgba(0,240,255,0.15);
      --glow-pink: 0 0 20px rgba(255,0,122,0.45), 0 0 40px rgba(255,0,122,0.15);
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 배경 */
    .bg {
      position: fixed;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?w=1600&h=900&fit=crop')
                  center / cover no-repeat;
      filter: brightness(0.18) saturate(0.6);
      z-index: 0;
    }

    /* 헤더 */
    header {
      position: relative;
      z-index: 10;
      padding: 0 40px;
      height: 70px;
      display: flex;
      align-items: center;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow: var(--glow-cyan);
      text-decoration: none;
    }

    /* 로그인 카드 */
    main {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(22, 24, 32, 0.9);
      border: 1px solid rgba(0,240,255,0.15);
      border-radius: 16px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }

    .login-card__title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      margin-bottom: 8px;
      color: var(--white);
    }
    .login-card__sub {
      font-size: 0.875rem;
      color: var(--gray);
      margin-bottom: 36px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--gray);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--white);
      font-size: 0.95rem;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.2); }
    .form-group input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,240,255,0.1);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      font-size: 0.82rem;
    }
    .form-options label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gray);
      cursor: pointer;
    }
    .form-options input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--cyan);
      cursor: pointer;
    }
    .form-options a {
      color: var(--cyan);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .form-options a:hover { opacity: 0.7; }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--pink);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: var(--glow-pink);
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255,0,122,0.6);
    }
    .btn-login:active { transform: scale(0.98); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      color: var(--gray);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-signup {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 400;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-signup:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(22,24,32,0.95);
      border: 1px solid var(--cyan);
      border-radius: 8px;
      padding: 14px 28px;
      font-size: 0.9rem;
      color: var(--white);
      box-shadow: var(--glow-cyan);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; }
      header { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <header>
    <a href="index.html" class="logo">MOOV</a>
  </header>

  <main>
    <div class="login-card">
      <h1 class="login-card__title">로그인</h1>
      <p class="login-card__sub">MOOV 계정으로 계속하세요</p>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="email" placeholder="example@moov.com" required />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="password" placeholder="비밀번호를 입력하세요" required />
        </div>

        <div class="form-options">
          <label>
            <input type="checkbox" /> 로그인 상태 유지
          </label>
          <a href="#" onclick="showToast('비밀번호 재설정 메일을 발송합니다'); return false;">
            비밀번호 찾기
          </a>
        </div>

        <button type="submit" class="btn-login">로그인</button>
      </form>

      <div class="divider">또는</div>

      <button class="btn-signup" onclick="showToast('회원가입 페이지로 이동합니다')">
        새 계정 만들기
      </button>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://zhsgrijtbgfrflwwgwwp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpoc2dyaWp0YmdmcmZsd3dnd3dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTczODEsImV4cCI6MjA5NjQzMzM4MX0.FiE8krEBr4pqOdUx7k3_Sh4sqfOO7fB0H8sfr2Yfbbo';
    const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_KEY);

    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!supabaseClient) {
        showToast('서버 연결에 실패했습니다');
        return;
      }

      const btn = document.querySelector('.btn-login');
      btn.textContent = '로그인 중...';
      btn.disabled = true;

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      btn.textContent = '로그인';
      btn.disabled = false;

      if (error) {
        showToast('이메일 또는 비밀번호가 올바르지 않습니다');
      } else {
        showToast('로그인 성공! 환영합니다 🎬');
        setTimeout(() => { window.location.href = 'index.html'; }, 1200);
      }
    }
  </script>
</body>
</html>
