<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>픽셀 고양이</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060d1a; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const P = 6; // px per pixel-unit

/* ── Stars ─────────────────────────────────────────────── */
const STARS = Array.from({ length: 120 }, () => ({
  x: Math.random(),
  y: Math.random() * 0.68,
  s: Math.random() < 0.75 ? 1 : 2,
  ph: Math.random() * Math.PI * 2,
}));

/* ── Clouds (slow drift) ────────────────────────────────── */
const CLOUDS = Array.from({ length: 4 }, (_, i) => ({
  x: (i / 4) * 1.2,
  y: 0.08 + Math.random() * 0.12,
  w: 8 + Math.floor(Math.random() * 6),
}));

/* ── Cat state ──────────────────────────────────────────── */
const cat = { x: 120, vx: 1.8, frame: 0, timer: 0, frameDur: 10 };

/* ── Fish (bonus!) ──────────────────────────────────────── */
const fish = { x: 0.55, vx: -0.0004, visible: true, timer: 0 };

let tick = 0;

/* ═══════════════════════════════════════════════════════════
   DRAW: background
   ══════════════════════════════════════════════════════════ */
function drawBg() {
  const W = canvas.width, H = canvas.height;
  const gY = Math.floor(H * 0.74);

  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, gY);
  sky.addColorStop(0, '#040a14');
  sky.addColorStop(1, '#0d2244');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, gY);

  // Stars
  STARS.forEach(s => {
    const tw = 0.55 + 0.45 * Math.sin(tick * 0.025 + s.ph);
    ctx.globalAlpha = tw;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(Math.floor(s.x * W), Math.floor(s.y * H), s.s, s.s);
  });
  ctx.globalAlpha = 1;

  // Moon
  const mX = Math.floor(W * 0.82), mY = Math.floor(H * 0.14);
  ctx.fillStyle = '#FFF8D0';
  ctx.beginPath(); ctx.arc(mX, mY, 28, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#E0DCA8';
  [[mX-9, mY-7, 5],[mX+10, mY+9, 4],[mX+2, mY-11, 3]].forEach(([cx,cy,r]) => {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  });

  // Clouds (pixel style)
  CLOUDS.forEach(cl => {
    const cx = ((cl.x % 1.3) * W) | 0;
    const cy = (cl.y * H) | 0;
    const cw = cl.w * P, ch = 2 * P;
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#AACCFF';
    ctx.fillRect(cx, cy + P, cw, ch);
    ctx.fillRect(cx + P, cy, cw - 2*P, P);
    ctx.globalAlpha = 1;
  });

  // Ground
  ctx.fillStyle = '#0f2a1a';
  ctx.fillRect(0, gY, W, H - gY);

  // Grass bumps
  for (let x = 0; x < W; x += P) {
    const h = (1 + Math.round((Math.sin(x * 0.04 + 1) * 0.5 + 0.5) * 2)) * P;
    ctx.fillStyle = x % (P*2) === 0 ? '#2a7a4a' : '#236640';
    ctx.fillRect(x, gY - h + P, P, h);
  }

  // Ground top line
  ctx.fillStyle = '#33995a';
  ctx.fillRect(0, gY, W, P);
}

/* ═══════════════════════════════════════════════════════════
   DRAW: pixel cat  (12 u wide × 15 u tall, P=6px)
   ══════════════════════════════════════════════════════════ */
function drawCat(x, y, frame, right) {
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  if (!right) { ctx.translate(12 * P, 0); ctx.scale(-1, 1); }

  // shorthand: fill rect in pixel units
  const r = (col, row, w, h, c) => {
    ctx.fillStyle = c;
    ctx.fillRect(col*P, row*P, w*P, h*P);
  };

  const BODY   = '#E8841A';
  const LIGHT  = '#F5C07A';
  const STRIPE = '#A05808';
  const EYE    = '#141414';
  const IRIS   = '#55CCFF';
  const PINK   = '#FF7799';
  const SHINE  = '#DDFFFF';

  // Tail (behind cat, cols 9-11)
  r(10,8, 2,1, BODY);
  r(10,7, 1,2, BODY);
  r(11,5, 1,3, BODY);
  r(10,4, 2,2, BODY);
  r(9, 3, 2,2, BODY);
  r(9, 2, 1,2, LIGHT);   // tip

  // Ears
  r(1,0, 2,2, BODY);  r(7,0, 2,2, BODY);
  r(2,0, 1,1, PINK);  r(8,0, 1,1, PINK);

  // Head
  r(1,1, 8,5, BODY);
  // head stripes
  r(3,1, 1,2, STRIPE); r(5,1, 1,2, STRIPE);

  // Eyes: 2×2 black + 1×1 iris + shine dot
  r(2,2, 2,2, EYE); r(6,2, 2,2, EYE);
  r(2,2, 1,1, IRIS); r(6,2, 1,1, IRIS);
  r(2,2, 1,1, SHINE); r(6,2, 1,1, SHINE); // tiny shine overrides iris center

  // Nose
  r(4,4, 2,1, PINK); r(5,4, 1,1, '#FF4466');

  // Body
  r(0,6, 10,5, BODY);
  // Side stripes
  r(0,7, 1,3, STRIPE); r(9,7, 1,3, STRIPE);
  // Belly
  r(2,7, 6,3, LIGHT);

  // Legs  (frame0: fl↓fr↑bl↑br↓  |  frame1: opposite)
  const f = frame;
  const dn=4, up=3;
  r(1, 11, 2, f===0?dn:up, BODY);  // front-left
  r(4, 11, 2, f===0?up:dn, BODY);  // front-right
  r(6, 10, 2, f===0?up:dn, BODY);  // back-left
  r(8, 10, 2, f===0?dn:up, BODY);  // back-right

  // Paws (light color at foot)
  r(1, 11+(f===0?dn:up)-1, 2,1, LIGHT);
  r(4, 11+(f===0?up:dn)-1, 2,1, LIGHT);
  r(6, 10+(f===0?up:dn)-1, 2,1, LIGHT);
  r(8, 10+(f===0?dn:up)-1, 2,1, LIGHT);

  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   DRAW: pixel fish  (small, 5×3 units)
   ══════════════════════════════════════════════════════════ */
function drawFish(x, y) {
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  const r = (col,row,w,h,c)=>{ ctx.fillStyle=c; ctx.fillRect(col*P,row*P,w*P,h*P); };
  r(1,1, 3,1,'#88CCFF');
  r(0,0, 1,3,'#6699FF');  // tail
  r(2,0, 3,3,'#AADDFF');
  r(4,1, 1,1,'#FF8866');  // eye
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   DRAW: title text
   ══════════════════════════════════════════════════════════ */
function drawUI() {
  const W = canvas.width;
  // title shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.font = 'bold 22px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[ 픽셀 고양이 ]', W/2+2, 44);
  // title
  ctx.fillStyle = '#FFD700';
  ctx.fillText('[ 픽셀 고양이 ]', W/2, 42);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px "Courier New", monospace';
  ctx.fillText('pixel cat  •  2026', W/2, 64);
}

/* ═══════════════════════════════════════════════════════════
   MAIN LOOP
   ══════════════════════════════════════════════════════════ */
function loop() {
  const W = canvas.width, H = canvas.height;
  const gY = Math.floor(H * 0.74);
  const catH = 15 * P;   // max height including legs
  const catW = 12 * P;

  // Move cat
  cat.x += cat.vx;
  if (cat.x < 10)        { cat.x = 10;      cat.vx =  Math.abs(cat.vx); }
  if (cat.x + catW > W-10){ cat.x = W-10-catW; cat.vx = -Math.abs(cat.vx); }

  // Animate walk frame
  cat.timer++;
  if (cat.timer >= cat.frameDur) { cat.timer = 0; cat.frame ^= 1; }

  // Move clouds
  CLOUDS.forEach(cl => { cl.x += 0.00015; });

  // Move fish
  fish.x += fish.vx;
  if (fish.x < -0.05) fish.x = 1.1;
  if (fish.x >  1.1)  fish.x = -0.05;

  // ── Render ──
  ctx.clearRect(0, 0, W, H);
  drawBg();

  // Fish floats near ground level
  if (fish.visible)
    drawFish(fish.x * W, gY - 4 * P);

  // Cat sits on ground
  drawCat(cat.x, gY - catH, cat.frame, cat.vx >= 0);

  drawUI();
  tick++;
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
